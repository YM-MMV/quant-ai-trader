# risk.yaml — deterministic risk limits enforced by the RiskManager.
#
# These are the hard limits from SAFETY.md expressed as config. The RiskManager
# (M7) reads them; no order may bypass them. Values here are conservative
# defaults for paper trading and can be tuned per environment.

require_stop_loss: true       # no order without a stop loss
require_take_profit: true     # no order without a take profit

max_daily_loss: 100.0         # account currency; halt new orders past this loss
max_open_trades: 3            # max simultaneous open positions
max_spread_points: 30         # reject if spread (in points) exceeds this

max_risk_per_trade_pct: 1.0   # % of equity riskable on a single trade
max_total_exposure_pct: 5.0   # % of equity across all open trades

kill_switch_enabled: true     # master switch able to halt all execution
